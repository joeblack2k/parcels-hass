name: Parcels Tracking Scraper
version: "0.1.7"
slug: parcels_fedex_scraper
description: Experimental local tracking scraper for Parcels for Home Assistant.
url: https://github.com/joeblack2k/parcels-hass/tree/main/addons/parcels_fedex_scraper
arch:
  - amd64
startup: services
boot: auto
init: false
stage: experimental
ports:
  8765/tcp: null
ports_description:
  8765/tcp: Optional HTTP API for the parcels-hass tracking scraper bridge.
watchdog: http://[HOST]:[PORT:8765]/health
options:
  headless: true
  timeout: 45
  vinted_auto_login: false
  vinted_login_on_start: true
  vinted_login_interval_hours: 22
schema:
  scraper_token: password?
  headless: bool
  timeout: int(10,90)
  vinted_auto_login: bool
  vinted_login_on_start: bool
  vinted_login_interval_hours: int(1,168)
  vinted_email: str?
  vinted_password: password?
  vinted_session_cookie: password?
  vinted_email_2: str?
  vinted_password_2: password?
  vinted_session_cookie_2: password?
