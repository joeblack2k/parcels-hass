name: Add-on

on:
  push:
  pull_request:

jobs:
  build-fedex-scraper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build FedEx scraper add-on
        run: |
          docker build \
            --build-arg BUILD_ARCH=amd64 \
            --build-arg BUILD_VERSION=0.1.0 \
            addons/parcels_fedex_scraper
